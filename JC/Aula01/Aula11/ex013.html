<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    Velocidade do Carro: <input type="number" name="txtvel" id="txtvel">
    <input type="button" value="Verficar" onclick="calcular()">
    <div id = res>

    </div>
    <script>
        function calcular() {
            var txtv = window.document.querySelector('input#txtvel')
            var res = window.document.querySelector('div#res')
            var vel = Number(txtv.value)
            res.innerHTML = `<p>Sua velocidade atual foi de ${vel}Km/h</p>`
                if (vel > 80) {
                    res.innerHTML += 'Sua velocidade estava acima do permitido, <strong>Multado<strong>'
                }
                res.innerHTML += '<p>Digira sempre com cuidado</p>'
        }
    </script>
</body>
</html>
