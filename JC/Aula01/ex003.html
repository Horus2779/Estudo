<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body {
            background-color: rgb(0, 0, 0) ;
            color: white;
            font: normal 16pt Arial;
        }
        p {
            color: aqua;
        }
    </style>
</head>
<body>
    <h1>Ola, Mundo!</h1>
    <p>Ja me livrei da maldicao</p>
    <script>
        var n1 = Number(window.prompt('Digite um Numero' ));
        var n2 = Number(window.prompt('Digite outro numero' ));
        var s = n1 + n2
        window.alert(`A soma de ${n1} e ${n2} é igual a ${s} `)
        // + Soma (number + number)
        // + Concatenação (String + String)
        /*Conversões 
        Number(n), qualquer string para numero
        Number.parseInt(n) Numero inteiro
        number.parseFloat(n) Numero Real
        String(n), Numero para string
        .toString(),*/
    </script>
</body>
</html>
